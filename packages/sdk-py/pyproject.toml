[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "metavita"
version = "0.1.0"
description = "Official Python SDK for the MetaVita agentic RAG platform."
readme = "README.md"
license = "Apache-2.0"
requires-python = ">=3.10"
dependencies = ["httpx>=0.27"]

[project.optional-dependencies]
dev = ["pytest>=8", "pytest-asyncio>=0.23"]

[tool.hatch.build.targets.wheel]
packages = ["src/metavita"]
