[project]
name = "metavita-providers"
version = "0.0.0"
description = "MetaVita provider abstraction — chat, embeddings, rerank across Anthropic / OpenAI / Ollama / BYO"
requires-python = ">=3.12"
dependencies = [
    "anthropic>=0.40",
    "openai>=1.50",
    "httpx>=0.27",
    "pydantic>=2.7",
    "cryptography>=43",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/metavita_providers"]
