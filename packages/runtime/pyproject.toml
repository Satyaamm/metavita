[project]
name = "metavita-runtime"
version = "0.0.0"
description = "MetaVita runtime engine — ingest (parse/chunk/embed) and retrieve/answer pipelines"
requires-python = ">=3.12"
dependencies = [
    "metavita-providers",
    "pypdf>=5.0",
    "python-docx>=1.1",
    "beautifulsoup4>=4.12",
    "pydantic>=2.7",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/metavita_runtime"]
