# Default values for the MetaVita chart.

image:
  registry: ghcr.io/metavita
  tag: latest
  pullPolicy: IfNotPresent

api:
  replicas: 2
  port: 8000
  resources:
    requests: { cpu: 250m, memory: 512Mi }
    limits: { cpu: "1", memory: 1Gi }

worker:
  replicas: 2
  resources:
    requests: { cpu: 250m, memory: 512Mi }
    limits: { cpu: "1", memory: 2Gi }

web:
  replicas: 2
  port: 3000
  resources:
    requests: { cpu: 100m, memory: 256Mi }
    limits: { cpu: 500m, memory: 512Mi }

# External managed services in production (RDS / ElastiCache / S3). Provide via a
# pre-created Secret named `metavita-secrets` with these keys, or set inline (dev only).
config:
  databaseUrl: ""   # postgresql+asyncpg://…
  redisUrl: ""      # redis://…
  s3Endpoint: ""    # https://s3.amazonaws.com
  s3Bucket: metavita

existingSecret: metavita-secrets

ingress:
  enabled: false
  host: metavita.example.com
  className: nginx
