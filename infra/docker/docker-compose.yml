# MetaVita local dev infrastructure.
# Brings up Postgres+pgvector, Redis, and MinIO (S3-compatible object store).
#   docker compose -f infra/docker/docker-compose.yml up -d

name: metavita

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: metavita
      POSTGRES_PASSWORD: metavita
      POSTGRES_DB: metavita
    ports:
      # Host port is overridable so MetaVita can coexist with another local Postgres.
      - "${METAVITA_POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U metavita"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${METAVITA_REDIS_PORT:-6379}:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "${METAVITA_MINIO_PORT:-9000}:9000"          # S3 API
      - "${METAVITA_MINIO_CONSOLE_PORT:-9001}:9001"  # console
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 10

  clamav:
    image: clamav/clamav:latest
    ports:
      - "3310:3310"
    volumes:
      - clamavdb:/var/lib/clamav   # persist the virus DB across restarts
    healthcheck:
      # The image ships a clamd ping check; gives clamd time to load signatures.
      test: ["CMD", "/usr/local/bin/clamdcheck.sh"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 120s

  # One-shot: create the default bucket on startup.
  createbuckets:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing local/metavita;
      exit 0;
      "

volumes:
  pgdata:
  redisdata:
  miniodata:
  clamavdb:
